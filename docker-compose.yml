services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: world_open_map
      POSTGRES_USER: world
      POSTGRES_PASSWORD: world
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./world_open_map.db
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws/live
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
